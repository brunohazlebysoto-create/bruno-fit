<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>
    window.addEventListener('error', function(e) {
      var root = document.getElementById('root') || document.body;
      var errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.top = '0';
      errDiv.style.left = '0';
      errDiv.style.right = '0';
      errDiv.style.bottom = '0';
      errDiv.style.background = '#1a0000';
      errDiv.style.color = '#ff6b8a';
      errDiv.style.padding = '20px';
      errDiv.style.overflow = 'auto';
      errDiv.style.zIndex = '999999';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.fontSize = '14px';
      errDiv.style.lineHeight = '1.5';
      errDiv.innerHTML = '<h2>🚨 ERROR CRÍTICO DE APLICACIÓN</h2>' +
        '<p><b>Mensaje:</b> ' + e.message + '</p>' +
        '<p><b>Archivo:</b> ' + e.filename + ' (Línea ' + e.lineno + ', Columna ' + e.colno + ')</p>' +
        '<p><b>Stack:</b></p><pre>' + (e.error ? e.error.stack : 'No disponible') + '</pre>' +
        '<p>Por favor, copia este error y envíaselo al asistente para corregirlo de inmediato.</p>';
      root.appendChild(errDiv);
    });
    window.addEventListener('unhandledrejection', function(e) {
      var root = document.getElementById('root') || document.body;
      var errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.top = '0';
      errDiv.style.left = '0';
      errDiv.style.right = '0';
      errDiv.style.bottom = '0';
      errDiv.style.background = '#1a0000';
      errDiv.style.color = '#ff6b8a';
      errDiv.style.padding = '20px';
      errDiv.style.overflow = 'auto';
      errDiv.style.zIndex = '999999';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.fontSize = '14px';
      errDiv.style.lineHeight = '1.5';
      errDiv.innerHTML = '<h2>🚨 PROMESA RECHAZADA (UNHANDLED REJECTION)</h2>' +
        '<p><b>Razón:</b> ' + (e.reason ? (e.reason.message || e.reason) : 'Desconocida') + '</p>' +
        '<p><b>Stack:</b></p><pre>' + (e.reason && e.reason.stack ? e.reason.stack : 'No disponible') + '</pre>' +
        '<p>Por favor, copia este error y envíaselo al asistente para corregirlo de inmediato.</p>';
      root.appendChild(errDiv);
    });
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Centro de Mando Fitness - Panel inteligente para nutrición, entrenamiento y composición corporal personalizado para Bruno.">
  
  <!-- PWA Configuration -->
  <meta name="theme-color" content="#0c0e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Centro de Mando Fitness">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.json">

  <title>Centro de Mando Fitness - Bruno</title>
  
  <!-- Google Fonts: Bebas Neue, Manrope & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Import Map to resolve imports cleanly and prevent multiple React instances -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime?deps=react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
      "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
    }
  }
  </script>

  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- Root entry point for React -->
  <div id="root"></div>

  <!-- Dynamic Loader with IndexedDB Caching for Instant Page Load -->
  <script>
    (async function() {
      const rootEl = document.getElementById('root');
      
      // Render a premium loader during compilation on first load
      const loaderDiv = document.createElement('div');
      loaderDiv.id = 'app-preloader';
      loaderDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#0c0e0b;color:#f3f4ea;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;z-index:999999;transition:opacity 0.3s ease;';
      loaderDiv.innerHTML = `
        <div style="width:40px;height:40px;border:3px solid rgba(205,255,74,0.1);border-top-color:#cdff4a;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;"></div>
        <div style="font-size:16px;font-weight:700;letter-spacing:0.05em;color:#cdff4a;margin-bottom:8px;">BRUNOFIT</div>
        <div id="preloader-status" style="font-size:11px;color:#9aa088;max-width:240px;text-align:center;line-height:1.4;">Iniciando panel...</div>
        <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
      `;
      rootEl.appendChild(loaderDiv);

      const statusEl = document.getElementById('preloader-status');

      async function getHash(text) {
        const msgBuffer = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-1', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      }

      function getCachedCode(hash) {
        return new Promise((resolve) => {
          const request = indexedDB.open('BabelCache', 1);
          request.onupgradeneeded = (e) => {
            e.target.result.createObjectStore('scripts');
          };
          request.onsuccess = (e) => {
            const db = e.target.result;
            const transaction = db.transaction('scripts', 'readonly');
            const store = transaction.objectStore('scripts');
            const getReq = store.get(hash);
            getReq.onsuccess = () => resolve(getReq.result);
            getReq.onerror = () => resolve(null);
          };
          request.onerror = () => resolve(null);
        });
      }

      function cacheCode(hash, code) {
        return new Promise((resolve) => {
          const request = indexedDB.open('BabelCache', 1);
          request.onsuccess = (e) => {
            const db = e.target.result;
            const transaction = db.transaction('scripts', 'readwrite');
            const store = transaction.objectStore('scripts');
            store.clear(); // una sola versión compilada: evita acumular builds viejos
            store.put(code, hash);
            transaction.oncomplete = () => resolve(true);
          };
        });
      }

      function loadBabel() {
        return new Promise((resolve, reject) => {
          if (window.Babel) return resolve();
          statusEl.innerText = "Cargando motor de optimización (solo primer uso)...";
          const script = document.createElement('script');
          script.src = "https://unpkg.com/@babel/standalone/babel.min.js";
          script.crossOrigin = "anonymous";
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      try {
        // Fetch app.js source — ?t= busts HF CDN cache; IndexedDB re-uses compiled code if content hash matches
        const res = await fetch('./app.js?t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error("No se pudo cargar el archivo app.js");
        const appCode = await res.text();
        const hash = await getHash(appCode);

        let compiledCode = await getCachedCode(hash);
        
        if (!compiledCode) {
          statusEl.innerText = "Optimizando código de la aplicación (solo primer uso)...";
          await loadBabel();
          
          compiledCode = Babel.transform(appCode, {
            presets: [['react', { runtime: 'classic' }]],
            filename: 'app.js'
          }).code;
          
          await cacheCode(hash, compiledCode);
        }

        // Hide preloader shortly after execution begins
        window.addEventListener('load-completed', () => {
          loaderDiv.style.opacity = 0;
          setTimeout(() => loaderDiv.remove(), 300);
        });

        // Execute transpiled script as a module
        const blob = new Blob([compiledCode], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const moduleScript = document.createElement('script');
        moduleScript.type = 'module';
        moduleScript.src = url;
        document.body.appendChild(moduleScript);

      } catch (err) {
        console.error("Error en cargador IndexedDB/Babel:", err);
        statusEl.innerHTML = `<span style="color:#ff6b8a">Error al iniciar: ${err.message}</span><br>Cargando en modo lento de respaldo...`;
        
        // Fallback: load Babel standalone normally and load app.js
        await loadBabel();
        const fallbackScript = document.createElement('script');
        fallbackScript.type = 'text/babel';
        fallbackScript.setAttribute('data-type', 'module');
        fallbackScript.src = './app.js';
        document.body.appendChild(fallbackScript);
      }
    })();
  </script>

  <!-- Service Worker registration + auto-reload on update -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
        navigator.serviceWorker.addEventListener("message", (e) => {
          if (e.data && e.data.type === "SW_UPDATED") {
            window.location.reload();
          }
        });
      });
    }
  </script>
</body>
</html>
