name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ci@brunofit.app"
          git config user.name "BrunoFit CI"
          git push https://BrunoEduardo:${HF_TOKEN}@huggingface.co/spaces/BrunoEduardo/brunofit main --force
