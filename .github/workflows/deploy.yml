name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

          # Crear rama temporal sin archivos binarios LFS para HF
          git checkout -b hf-deploy

          # Eliminar archivos binarios que HF rechaza (PNG via LFS)
          git lfs ls-files -n | xargs -I{} git rm --cached "{}" 2>/dev/null || true
          find . -name "*.png" -not -path "./.git/*" | xargs git rm --cached 2>/dev/null || true

          # Si hubo cambios, hacer commit
          git diff --cached --quiet || git commit -m "chore: remove binary files for HF deployment"

          # Push a Hugging Face
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/BrunoEduardo/bruno-fit
          git push --force hf hf-deploy:main
