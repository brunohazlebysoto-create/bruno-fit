name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - claude/ai-trainer-agent-window-arck0p

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

          # Eliminar fisicamente los archivos binarios del disco
          find . -name "*.png" -not -path "./.git/*" -delete
          find . -name "*.jpg" -not -path "./.git/*" -delete
          find . -name "*.ico" -not -path "./.git/*" -delete

          # Crear rama huerfana (sin historial) para evitar que HF encuentre binarios en commits anteriores
          git checkout --orphan hf-deploy

          # Remover binarios del index
          git rm --cached $(git ls-files "*.png" "*.jpg" "*.ico") 2>/dev/null || true

          # Agregar todo lo demas
          git add -A

          # Commit limpio
          git commit -m "deploy: bruno-fit to Hugging Face Spaces"

          # Push a HF
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/BrunoEduardo/bruno-fit
          git push --force hf hf-deploy:main
