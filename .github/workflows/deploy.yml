name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

          # Desinstalar git-lfs para evitar que expanda los punteros al hacer push
          git lfs uninstall 2>/dev/null || true

          # Eliminar archivos PNG del índice git (quedan como punteros LFS o no existen)
          git rm --cached $(git ls-files "*.png") 2>/dev/null || true
          git rm --cached $(git ls-files "*.jpg") 2>/dev/null || true
          git rm --cached $(git ls-files "*.ico") 2>/dev/null || true

          # Commit solo si hay cambios staged
          git diff --cached --quiet || git commit -m "chore: exclude binary files for HF deployment"

          # Push a Hugging Face
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/BrunoEduardo/bruno-fit
          git push --force hf HEAD:refs/heads/main
