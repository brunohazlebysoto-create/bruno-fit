name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - claude/ai-trainer-agent-window-arck0p

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

          # Deshabilitar LFS para que no interfiera con el push a HF
          git lfs uninstall --local 2>/dev/null || true

          # Eliminar archivos binarios del disco y del index
          find . -name "*.png" -not -path "./.git/*" -delete
          find . -name "*.jpg" -not -path "./.git/*" -delete
          find . -name "*.ico" -not -path "./.git/*" -delete
          git rm --cached $(git ls-files "*.png" "*.jpg" "*.ico") 2>/dev/null || true

          # Commit con README y sin binarios
          git add -A
          git diff --cached --quiet || git commit -m "deploy: remove binaries for HF"

          # Push directo a HF (fetch-depth:0 evita "shallow update not allowed")
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/BrunoEduardo/bruno-fit
          git push --force hf HEAD:main
