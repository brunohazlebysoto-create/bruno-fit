name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # El token de Hugging Face debe ser almacenado en los Secrets de tu repositorio de GitHub como HF_TOKEN.
        run: |
          # Configurar identidad de git
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          
          # Agregar el repositorio de Hugging Face Spaces como un remote
          # Se asume que el nombre del Space es "bruno-fit".
          # Puedes cambiar el nombre si tu espacio se llama de otra forma en Hugging Face.
          git remote add hf https://BrunoEduardo:$HF_TOKEN@huggingface.co/spaces/BrunoEduardo/bruno-fit
          
          # Empujar la rama actual (main) a la rama master de Hugging Face Spaces (que es la rama por defecto de los Spaces)
          git push --force hf main:refs/heads/main
