name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - claude/ai-trainer-agent-window-arck0p

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          git lfs uninstall --local 2>/dev/null || true

          # Crear rama huerfana = historial limpio (HF rechaza binarios en cualquier commit del historial)
          git checkout --orphan hf-deploy

          # Vaciar el index completamente
          git rm -rf --cached . 2>/dev/null || true

          # Borrar binarios del disco
          find . -name "*.png" -not -path "./.git/*" -delete
          find . -name "*.jpg" -not -path "./.git/*" -delete
          find . -name "*.ico" -not -path "./.git/*" -delete

          # Agregar todo lo que queda en disco (incluye README.md, app.js, style.css, etc.)
          git add -A

          # Commit unico sin binarios
          git commit -m "deploy"

          # Push a HF (historial de 1 commit, sin binarios en ninguna parte)
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/BrunoEduardo/bruno-fit
          git push --force hf HEAD:main
