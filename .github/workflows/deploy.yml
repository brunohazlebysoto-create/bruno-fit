name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - claude/ai-trainer-agent-window-arck0p

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy via HF Hub API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])

          api.upload_folder(
              folder_path=".",
              repo_id="BrunoEduardo/bruno-fit",
              repo_type="space",
              ignore_patterns=[
                  ".git/*",
                  ".env",
                  "*.png",
                  "*.jpg",
                  "*.ico",
                  ".github/*",
                  "node_modules/*",
                  "__pycache__/*",
                  "*.test.js",
                  "jest*",
                  "babel*",
                  "package-lock.json",
                  "schema.sql",
                  "deploy_hf.py",
              ],
              commit_message="deploy: bruno-fit",
          )
          print("Deploy exitoso!")
          EOF
